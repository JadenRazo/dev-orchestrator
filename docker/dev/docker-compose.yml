version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: dev-orchestrator-postgres
    environment:
      POSTGRES_DB: dev_orchestrator
      POSTGRES_USER: dev_user
      POSTGRES_PASSWORD: dev_password
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256 --auth-local=scram-sha-256"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dev_user -d dev_orchestrator"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - dev-orchestrator-network

  redis:
    image: redis:7.2-alpine
    container_name: dev-orchestrator-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
      - ./redis.conf:/etc/redis/redis.conf
    command: redis-server /etc/redis/redis.conf
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - dev-orchestrator-network

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: dev-orchestrator-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@devorchestrator.com
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - dev-orchestrator-network

  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: dev-orchestrator-redis-commander
    environment:
      REDIS_HOSTS: local:redis:6379
    ports:
      - "8081:8081"
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - dev-orchestrator-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  pgadmin_data:
    driver: local

networks:
  dev-orchestrator-network:
    driver: bridge
    name: dev-orchestrator-network